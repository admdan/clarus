<div id="banking-info-container">
    {% set can_edit_directly = current_user.role in ['admin', 'hr', 'support'] %}
    <form hx-post="{{ url_for('profile.update_banking_info') }}?user_id={{ user_id }}"
          hx-target="#banking-info-container"
          hx-swap="outerHTML"
          class="card shadow-sm mb-4">
        <div class="card-header">
            <h5 class="mb-0">
                Edit Banking Info
            </h5>
        </div>
        <div class="card-body">
            <div class="mb-3">
                <label class="form-label">Bank Name</label>
                <input type="text"
                       class="form-control {{ 'bg-dark-subtle' if can_edit_directly else 'bg-primary-subtle' }}"
                       name="bank_name"
                       value="{{ banking.bank_name or '' }}"
                       {% if not can_edit_directly %}readonly{% endif %}>
                {% if not can_edit_directly %}
                    <button type="button"
                            class="btn btn-sm btn-outline-danger mt-1"
                            data-change-field="Bank Name"
                            data-change-type="text"
                            onclick="openChangeRequestModal(this)">
                        Request Change
                    </button>
                {% endif %}
            </div>
            <div class="mb-3">
                <label class="form-label">Bank Account Number</label>
                <input type="text"
                       class="form-control {{ 'bg-dark-subtle' if can_edit_directly else 'bg-primary-subtle' }}"
                       name="bank_account_number"
                       value="{{ banking.bank_account_number or '' }}"
                       {% if not can_edit_directly %}readonly{% endif %}>
                {% if not can_edit_directly %}
                    <button type="button"
                            class="btn btn-sm btn-outline-danger mt-1"
                            data-change-field="Bank Account Number"
                            data-change-type="text"
                            onclick="openChangeRequestModal(this)">
                        Request Change
                    </button>
                {% endif %}
            </div>
            <div class="mb-3">
                <label class="form-label">Account Holder Name</label>
                <input type="text"
                       class="form-control {{ 'bg-dark-subtle' if can_edit_directly else 'bg-primary-subtle' }}"
                       name="account_holder_name"
                       value="{{ banking.account_holder_name or '' }}"
                       {% if not can_edit_directly %}readonly{% endif %}>
                {% if not can_edit_directly %}
                    <button type="button"
                            class="btn btn-sm btn-outline-danger mt-1"
                            data-change-field="Account Holder Name"
                            data-change-type="text"
                            onclick="openChangeRequestModal(this)">
                        Request Change
                    </button>
                {% endif %}
            </div>
        </div>
        <div class="card-footer d-flex justify-content-between">
            {% if can_edit_directly %}
                <button type="submit" class="btn btn-success">Save</button>
            {% endif %}
            <button type="button"
                    class="btn btn-secondary"
                    hx-get="{{ url_for('profile.banking_info') }}?user_id={{ user_id }}"
                    hx-target="#banking-info-container"
                    hx-swap="outerHTML">
              Cancel
            </button>
        </div>
    </form>
</div>
